{{ define "main" }}
<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a> / Gallery</div>
    <h1>Photo Gallery</h1>
    <div class="gold-bar"></div>
  </div>
</div>
<section>
  <div class="container">
    <div class="gallery-grid">
      {{ range (where .Site.RegularPages "Section" "gallery") }}
      <div class="gallery-item">
        <img src="{{ .Params.image }}" alt="{{ .Title }}" loading="lazy" />
        {{ with .Params.caption }}<div class="gallery-caption">{{ . }}</div>{{ end }}
      </div>
      {{ else }}
      <p style="color:var(--steel);">Photos will appear here once added through the admin panel.</p>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
