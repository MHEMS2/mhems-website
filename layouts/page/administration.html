{{ define "main" }}
<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="/">Home</a> / Administration</div>
    <h1>Administration</h1>
    <div class="gold-bar"></div>
  </div>
</div>
<section>
  <div class="container">

    {{ range .Params.staff }}
    <div class="admin-card" style="margin-bottom:2rem;">
      {{ if .photo }}
      <img src="{{ .photo }}" alt="{{ .name }}" class="admin-photo" />
      {{ else }}
      <div class="admin-photo-placeholder">Photo<br/>Coming<br/>Soon</div>
      {{ end }}
      <div>
        <div class="admin-title">{{ .title }}</div>
        <div class="admin-name">{{ .name }}</div>
        <div class="admin-credentials">{{ .credentials }}</div>
        <div class="gold-bar left"></div>
        <p>{{ .bio }}</p>
      </div>
    </div>
    {{ end }}

  </div>
</section>
{{ end }}
