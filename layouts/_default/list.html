{{ define "main" }}
<div class="page-header">
  <div class="container">
    <h1>{{ .Title }}</h1>
    <div class="gold-bar"></div>
  </div>
</div>
<section>
  <div class="container">
    {{ .Content }}
    {{ range .Pages }}
    <div class="card mb-2" style="margin-bottom:1rem;">
      <div class="card-body">
        <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
        <p>{{ .Summary }}</p>
      </div>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
