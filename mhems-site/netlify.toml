[build]
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.128.0"

[[plugins]]
  package = "@netlify/plugin-hugo"

[context.production.environment]
  HUGO_ENV = "production"

[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[forms]
  [forms.contact]
    success_url = "/contact/?success=true"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
